name: Release

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  PROJECT_DIR: ./옵시디언-AI-비서-v3.0-Tauri

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '${{ env.PROJECT_DIR }}/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.PROJECT_DIR }}
          tagName: v__VERSION__
          releaseName: '옵시디언 AI 비서 v__VERSION__'
          releaseBody: |
            # 옵시디언 AI 비서 v__VERSION__

            ## 다운로드
            - **Windows**: `옵시디언.AI.비서_*_x64-setup.exe` 또는 `*_x64_en-US.msi`
            - **macOS Apple Silicon + Intel**: `옵시디언.AI.비서_*_universal.dmg`
          releaseDraft: true
          prerelease: false
        
          args: ${{ matrix.args }}
