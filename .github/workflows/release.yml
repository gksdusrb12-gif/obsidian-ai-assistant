name: Release

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  PROJECT_DIR: ./옵시디언-AI-비서-v3.0-Tauri

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '${{ env.PROJECT_DIR }}/src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: '옵시디언 AI 비서 ${{ github.ref_name }}'
          releaseBody: |
            # 옵시디언 AI 비서 ${{ github.ref_name }}

            ## 다운로드
            - **Windows**: `옵시디언.AI.비서_*_x64-setup.exe` (NSIS 설치 마법사)
            - **macOS Apple Silicon + Intel**: `옵시디언.AI.비서_*_universal.dmg`
            - **Linux**: `*.deb` 또는 `*.AppImage`

            ## 설치
            1. 본인 OS에 맞는 파일 다운로드
            2. 더블클릭 → 설치 마법사 따라가기
            3. 시작 메뉴(Win) / Launchpad(Mac) 에서 "옵시디언 AI 비서" 실행
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
